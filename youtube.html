<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTube — Kanal Asistanı</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kanal">
  <meta name="theme-color" content="#fef3c7">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' https://accounts.google.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com https://*.ggpht.com https://i.ytimg.com https://*.ytimg.com; connect-src 'self' https://www.googleapis.com https://youtube.googleapis.com;">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="mainScreen" style="display:block">
  <div class="header">
    <div class="header-left">
      <a class="back-btn" href="index.html" aria-label="Hub'a dön">
        <svg width="18" height="18" fill="none" viewBox="0 0 18 18">
          <path d="M11 3L5 9l6 6" stroke="#000" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <div class="header-icon yt-header-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24">
          <path d="M22 8.2c0-1.6-1.2-2.9-2.7-3-2.4-.2-5.3-.4-7.3-.4s-4.9.2-7.3.4C3.2 5.3 2 6.6 2 8.2 1.9 9.7 1.9 11 1.9 12s0 2.3.1 3.8c0 1.6 1.2 2.9 2.7 3 2.4.2 5.3.4 7.3.4s4.9-.2 7.3-.4c1.5-.1 2.7-1.4 2.7-3 .1-1.5.1-2.8.1-3.8s0-2.3-.1-3.8z" fill="#fff" stroke="#000" stroke-width="2"/>
          <path d="M10 9l5 3-5 3z" fill="#000"/>
        </svg>
      </div>
      <span class="header-title">Kanal</span>
    </div>
    <div class="header-right">
      <button class="pdf-btn" id="refreshBtn" title="Yenile">
        <svg width="14" height="14" fill="none" viewBox="0 0 16 16">
          <path d="M2 8a6 6 0 1011-3.5M13 2v3h-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Yenile
      </button>
      <img id="userAvatar" src="" alt="Kullanıcı" class="user-avatar" title="Çıkış yapmak için tıklayın" style="display:none">
    </div>
  </div>

  <div class="yt-container">
    <div class="yt-channel-header" id="ytChannelHeader">
      <div class="yt-loading"><div class="yt-spin"></div><div>Yükleniyor...</div></div>
    </div>

    <div class="yt-stats" id="ytStats"></div>

    <div class="section-title">Son Videolar</div>
    <div class="yt-videos-grid" id="ytLatest"></div>

    <div class="section-title">En Çok İzlenenler</div>
    <div class="yt-top-list" id="ytTop"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module" src="js/youtube/main.js"></script>

</body>
</html>
