<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kaynak Kasası</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kaynak Kasası">
  <meta name="theme-color" content="#fef3c7">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' https://accounts.google.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com https://*.ggpht.com https://i.ytimg.com https://*.ytimg.com; connect-src 'self' https://www.googleapis.com https://youtube.googleapis.com;">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="mainScreen" style="display:block">
  <div class="header">
    <div class="header-left">
      <a class="back-btn" href="index.html" id="backBtn" aria-label="Hub'a dön">
        <svg width="18" height="18" fill="none" viewBox="0 0 18 18"><path d="M11 3L5 9l6 6" stroke="#000" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <div class="header-icon kaynak-header-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 22 22">
          <rect x="3" y="4" width="16" height="14" rx="2" stroke="#000" stroke-width="2.5"/>
          <path d="M7 9h8M7 13h5" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="header-title">Kaynak Kasası</span>
    </div>
    <div class="header-right">
      <img id="userAvatar" src="" alt="Kullanıcı" class="user-avatar" title="Çıkış yapmak için tıklayın">
    </div>
  </div>

  <div class="kaynak-wrap">
    <input id="searchInput" class="text-input search-input" type="search" placeholder="Kaynaklarda ara...">
    <div class="chip-row" id="filterChips"></div>
    <div class="kaynak-list" id="kaynakList"></div>
  </div>
</div>

<button class="fab" id="fabKaynak" aria-label="Kaynak Ekle">
  <svg width="32" height="32" fill="none" viewBox="0 0 28 28"><path d="M14 5v18M5 14h18" stroke="#000" stroke-width="3.5" stroke-linecap="round"/></svg>
</button>

<div class="modal-overlay" id="kaynakModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="kaynakModalTitle">Kaynak Ekle</span>
      <button class="modal-close" id="kaynakModalClose" aria-label="Kapat">
        <svg width="14" height="14" fill="none" viewBox="0 0 14 14"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="kaynakIdInput">
      <div class="input-group"><div class="input-label">Başlık</div><input id="kaynakTitleInput" class="text-input" type="text"></div>
      <div class="input-group"><div class="input-label">URL *</div><input id="kaynakUrlInput" class="text-input" type="url" placeholder="https://..."></div>
      <div class="input-group"><div class="input-label">Kategori</div><input id="kaynakCategoryInput" class="text-input" type="text" placeholder="AI, Hukuk, Kod..."></div>
      <div class="input-group"><div class="input-label">Etiketler</div><input id="kaynakTagsInput" class="text-input" type="text" placeholder="api, doküman"></div>
      <div class="input-group"><div class="input-label">Not</div><textarea id="kaynakNoteInput" class="text-input" rows="3"></textarea></div>
      <label class="type-btn" for="kaynakFavInput"><input id="kaynakFavInput" type="checkbox" style="margin-right:8px"> Favori</label>
      <div class="detail-actions">
        <button class="capture-btn" id="kaynakCancelBtn">Vazgeç</button>
        <button class="primary-btn" id="kaynakSaveBtn">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module" src="js/kaynak/main.js"></script>
</body>
</html>
