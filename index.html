<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Asistan Hub</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hub">
  <meta name="theme-color" content="#fef3c7">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── LOGIN ────────────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="56" height="56" fill="none" viewBox="0 0 44 44">
        <path d="M10 14h24M10 22h18M10 30h21" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="35" cy="30" r="6" fill="#fff" stroke="#000" stroke-width="2.5"/>
        <path d="M35 27v3.5l2 1.5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-title">Asistan Hub</div>
    <div class="logo-sub">Kişisel araç setiniz — Drive ve YouTube'da tek yerden</div>
  </div>
  <button class="login-btn" id="loginBtn">
    <svg width="22" height="22" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google ile Giriş Yap
  </button>
</div>

<!-- ── HUB ─────────────────────────────────────────────────────────────── -->
<div id="hubScreen" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 22 22">
          <rect x="3"  y="3"  width="7" height="7" rx="1.5" stroke="#000" stroke-width="2.5"/>
          <rect x="12" y="3"  width="7" height="7" rx="1.5" stroke="#000" stroke-width="2.5"/>
          <rect x="3"  y="12" width="7" height="7" rx="1.5" stroke="#000" stroke-width="2.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5" stroke="#000" stroke-width="2.5"/>
        </svg>
      </div>
      <span class="header-title">Asistan Hub</span>
    </div>
    <div class="header-right">
      <img id="userAvatar" src="" alt="Kullanıcı" class="user-avatar" title="Çıkış yapmak için tıklayın">
    </div>
  </div>

  <div class="hub-greet" id="hubGreet">Merhaba</div>
  <div class="hub-sub">Bir modül seç</div>

  <div class="hub-grid">
    <a class="module-card mc-yellow" href="muhasebe.html">
      <div class="mc-icon">
        <svg width="40" height="40" fill="none" viewBox="0 0 40 40">
          <rect x="6" y="4" width="26" height="32" rx="3" fill="#fff" stroke="#000" stroke-width="2.5"/>
          <rect x="10" y="9" width="18" height="3" rx="1" fill="#fde047" stroke="#000" stroke-width="1.5"/>
          <rect x="10" y="16" width="18" height="2" rx="1" fill="#000"/>
          <rect x="10" y="20" width="14" height="2" rx="1" fill="#000"/>
          <rect x="10" y="24" width="16" height="2" rx="1" fill="#000"/>
          <rect x="10" y="29" width="7" height="4" rx="1" fill="#4ade80" stroke="#000" stroke-width="1.2"/>
          <rect x="22" y="29" width="7" height="4" rx="1" fill="#f87171" stroke="#000" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="mc-text">
        <div class="mc-title">Muhasebe</div>
        <div class="mc-sub">Gelir &amp; gider evrakları</div>
      </div>
      <div class="mc-arrow">
        <svg width="22" height="22" fill="none" viewBox="0 0 22 22">
          <path d="M7 4l8 7-8 7" stroke="#000" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <a class="module-card mc-pink" href="youtube.html">
      <div class="mc-icon">
        <svg width="40" height="40" fill="none" viewBox="0 0 40 40">
          <rect x="3" y="9" width="34" height="22" rx="5" fill="#fff" stroke="#000" stroke-width="2.5"/>
          <path d="M17 16l8 4-8 4z" fill="#000"/>
        </svg>
      </div>
      <div class="mc-text">
        <div class="mc-title">YouTube</div>
        <div class="mc-sub">Kanal istatistikleri &amp; videolar</div>
      </div>
      <div class="mc-arrow">
        <svg width="22" height="22" fill="none" viewBox="0 0 22 22">
          <path d="M7 4l8 7-8 7" stroke="#000" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>
  </div>

  <div class="hub-foot">Daha fazla modül yakında</div>
</div>

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module" src="js/hub/main.js"></script>

</body>
</html>
