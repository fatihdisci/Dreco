<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Evrak Takip</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Evrak">
  <meta name="theme-color" content="#fef3c7">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── LOGIN ────────────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="56" height="56" fill="none" viewBox="0 0 44 44">
        <path d="M10 14h24M10 22h18M10 30h21" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="35" cy="30" r="6" fill="#fff" stroke="#000" stroke-width="2.5"/>
        <path d="M35 27v3.5l2 1.5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-title">Evrak Takip</div>
    <div class="logo-sub">Gelir &amp; gider evraklarınızı Drive'da düzenli saklayın</div>
  </div>
  <button class="login-btn" id="loginBtn">
    <svg width="22" height="22" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google ile Giriş Yap
  </button>
</div>

<!-- ── MAIN ─────────────────────────────────────────────────────────────── -->
<div id="mainScreen">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 20 20">
          <path d="M3 6h14M3 10h9M3 14h11" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="header-title">Evrak Takip</span>
    </div>
    <div class="header-right">
      <button class="pdf-btn" id="headerPdfBtn">
        <svg width="14" height="14" fill="none" viewBox="0 0 13 13">
          <path d="M6.5 1.5v7M4 6l2.5 2.5L9 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1.5 10.5h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        PDF
      </button>
      <img id="userAvatar" src="" alt="Kullanıcı" class="user-avatar" title="Çıkış yapmak için tıklayın">
    </div>
  </div>

  <div class="month-bar" id="monthBar"></div>

  <div class="stats-row">
    <div class="stat-card gelir-card">
      <div class="stat-label">
        <div class="stat-dot" style="background:var(--gelir)"></div>
        Gelir
      </div>
      <div class="stat-count" id="gelirCount">—</div>
      <div class="stat-sub">bu ayın evrakları</div>
    </div>
    <div class="stat-card gider-card">
      <div class="stat-label">
        <div class="stat-dot" style="background:var(--gider)"></div>
        Gider
      </div>
      <div class="stat-count" id="giderCount">—</div>
      <div class="stat-sub">bu ayın evrakları</div>
    </div>
  </div>

  <div class="section-title">Evraklar</div>
  <div class="files-grid" id="filesGrid">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="32" height="32" fill="none" viewBox="0 0 32 32">
          <rect x="6" y="4" width="20" height="24" rx="2" stroke="#000" stroke-width="2.5"/>
          <path d="M10 12h12M10 17h8" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="empty-title">Yükleniyor...</div>
    </div>
  </div>
</div>

<button class="fab" id="fab" style="display:none" aria-label="Evrak Ekle">
  <svg width="32" height="32" fill="none" viewBox="0 0 28 28">
    <path d="M14 5v18M5 14h18" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
  </svg>
</button>

<!-- ── ADD MODAL ────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Evrak Ekle</span>
      <button class="modal-close" id="addModalClose" aria-label="Kapat">
        <svg width="14" height="14" fill="none" viewBox="0 0 14 14">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="photo-preview" id="photoPreview">
        <img id="previewImg" src="" alt="Önizleme">
        <div class="photo-placeholder" id="previewPlaceholder">
          <svg width="48" height="48" fill="none" viewBox="0 0 44 44" style="margin:0 auto">
            <rect x="4" y="10" width="36" height="27" rx="3" stroke="#000" stroke-width="2.5"/>
            <circle cx="22" cy="23" r="7" stroke="#000" stroke-width="2.5"/>
            <path d="M15 10l2.5-5h9l2.5 5" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="36" cy="16" r="2" fill="#000"/>
          </svg>
          <p>Fotoğraf seçilmedi</p>
        </div>
      </div>

      <div class="capture-row">
        <button class="capture-btn" id="cameraBtn">
          <svg width="18" height="18" fill="none" viewBox="0 0 17 17">
            <path d="M13.5 4.5H3.5a1.5 1.5 0 00-1.5 1.5v7a1.5 1.5 0 001.5 1.5h10a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5z" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="8.5" cy="9.5" r="2.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M6 4.5l1.2-2.5h2.6L11 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Kamera
        </button>
        <button class="capture-btn" id="galleryBtn">
          <svg width="18" height="18" fill="none" viewBox="0 0 17 17">
            <rect x="2" y="3" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="6" cy="7" r="1.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M2 12l3.5-3.5 2.5 2.5 2-2 4.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Galeri
        </button>
      </div>

      <div class="type-toggle">
        <button class="type-btn active-gelir" id="gelirBtn">
          <svg width="16" height="16" fill="none" viewBox="0 0 15 15">
            <path d="M7.5 12V3M4 6l3.5-3 3.5 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Gelir
        </button>
        <button class="type-btn" id="giderBtn">
          <svg width="16" height="16" fill="none" viewBox="0 0 15 15">
            <path d="M7.5 3v9M4 9l3.5 3 3.5-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Gider
        </button>
      </div>

      <div class="input-group">
        <div class="input-label">Not (opsiyonel)</div>
        <input type="text" id="noteInput" class="text-input" placeholder="Yakıt fişi, elektrik faturası, vb.">
      </div>

      <button class="primary-btn" id="saveBtn">
        <span id="saveBtnText">Kaydet &amp; Drive'a Yükle</span>
        <div class="spinner" id="saveSpinner"></div>
      </button>
    </div>
  </div>
</div>

<!-- ── PDF MODAL ────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="pdfOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">PDF İndir</span>
      <button class="modal-close" id="pdfModalClose" aria-label="Kapat">
        <svg width="14" height="14" fill="none" viewBox="0 0 14 14">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <div class="input-label">Ay Seç</div>
        <select id="pdfMonthSel" class="select-input"></select>
      </div>
      <button class="pdf-dl-btn gelir" id="gelirPdfBtn">
        <svg width="18" height="18" fill="none" viewBox="0 0 17 17">
          <path d="M8.5 2v10M5.5 9l3 3 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2.5 14.5h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="gelirPdfTxt">Gelir PDF İndir</span>
        <div class="spinner" id="gelirSpin"></div>
      </button>
      <button class="pdf-dl-btn gider" id="giderPdfBtn">
        <svg width="18" height="18" fill="none" viewBox="0 0 17 17">
          <path d="M8.5 2v10M5.5 9l3 3 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2.5 14.5h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="giderPdfTxt">Gider PDF İndir</span>
        <div class="spinner" id="giderSpin"></div>
      </button>
    </div>
  </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment">
<input type="file" id="galleryInput" accept="image/*">

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="js/main.js"></script>

</body>
</html>
