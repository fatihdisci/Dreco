<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Evrak Takip</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0e0e14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap">
  <style>
    :root {
      --bg: #0e0e14;
      --surface: #17171f;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --text: #ededf5;
      --muted: #6a6a90;
      --gelir: #22c55e;
      --gider: #f43f5e;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
      position: relative;
    }

    /* ── LOGIN ── */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 48px 28px;
      gap: 56px;
      background: radial-gradient(ellipse at 50% 0%, rgba(245,158,11,.08) 0%, transparent 65%);
    }
    .logo-wrap { text-align: center; }
    .logo-icon {
      width: 88px; height: 88px;
      background: linear-gradient(145deg, #f59e0b, #d97706);
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
      box-shadow: 0 24px 48px rgba(245,158,11,.25);
    }
    .logo-title { font-size: 30px; font-weight: 700; letter-spacing: -.6px; }
    .logo-sub { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
    .login-btn {
      display: flex; align-items: center; gap: 12px;
      background: #fff; color: #1a1a1a;
      border: none; border-radius: 16px;
      padding: 17px 32px;
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 6px 24px rgba(0,0,0,.35);
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(0,0,0,.45); }
    .login-btn:active { transform: translateY(0); }

    /* ── MAIN ── */
    #mainScreen { display: none; min-height: 100dvh; }

    .header {
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0;
      background: rgba(14,14,20,.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 34px; height: 34px;
      background: linear-gradient(145deg, #f59e0b, #d97706);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .pdf-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .pdf-btn:hover { background: var(--border); }
    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%; object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--border);
    }

    /* ── MONTH BAR ── */
    .month-bar {
      padding: 14px 20px 10px;
      display: flex; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .month-bar::-webkit-scrollbar { display: none; }
    .month-chip {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); border-radius: 20px;
      padding: 7px 15px; font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all .15s;
    }
    .month-chip.active {
      background: var(--accent); border-color: var(--accent);
      color: #111; font-weight: 700;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 20px 16px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .stat-label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .4px;
      display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
    }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
    .stat-count { font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-count.gelir { color: var(--gelir); }
    .stat-count.gider { color: var(--gider); }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* ── GRID ── */
    .section-title {
      padding: 4px 20px 12px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .files-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 3px; padding: 0 20px 120px;
    }
    .file-item {
      aspect-ratio: 1; position: relative;
      border-radius: 10px; overflow: hidden;
      background: var(--surface); cursor: pointer;
    }
    .file-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .file-item-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
    }
    .file-badge {
      position: absolute; top: 5px; right: 5px;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .file-badge.gelir { background: var(--gelir); }
    .file-badge.gider { background: var(--gider); }
    .empty-state {
      grid-column: 1 / -1; text-align: center;
      padding: 64px 20px; color: var(--muted);
    }
    .empty-icon {
      width: 64px; height: 64px; margin: 0 auto 16px;
      background: var(--surface); border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 36px; right: 24px;
      width: 62px; height: 62px;
      background: linear-gradient(145deg, #f59e0b, #d97706);
      border: none; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(245,158,11,.45);
      transition: transform .15s, box-shadow .15s;
      z-index: 50;
    }
    .fab:hover { transform: scale(1.06); box-shadow: 0 12px 36px rgba(245,158,11,.55); }
    .fab:active { transform: scale(.95); }

    /* ── MODALS ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 100;
      align-items: flex-end;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 26px 26px 0 0;
      padding-bottom: max(env(safe-area-inset-bottom), 16px);
      width: 100%; max-height: 95dvh; overflow-y: auto;
      animation: slideUp .25s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 42px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 14px auto 0;
    }
    .modal-header {
      padding: 20px 20px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 19px; font-weight: 700; }
    .modal-close {
      background: var(--surface2); border: none; color: var(--muted);
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 0 20px 24px; display: flex; flex-direction: column; gap: 18px; }

    /* ── PHOTO AREA ── */
    .photo-preview {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface2); border-radius: 18px;
      overflow: hidden; display: flex;
      align-items: center; justify-content: center; flex-direction: column; gap: 10px;
      border: 2px dashed var(--border); position: relative;
    }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .photo-placeholder { text-align: center; color: var(--muted); }
    .photo-placeholder p { font-size: 13px; margin-top: 8px; }
    .capture-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .capture-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 12px;
      padding: 14px 12px; font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px; transition: background .15s;
    }
    .capture-btn:hover { background: var(--border); }

    /* ── TYPE TOGGLE ── */
    .type-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--surface2); border-radius: 14px; padding: 4px; gap: 4px;
    }
    .type-btn {
      padding: 15px; border: none; border-radius: 10px;
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s; background: transparent; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .type-btn.active-gelir { background: var(--gelir); color: #fff; box-shadow: 0 4px 16px rgba(34,197,94,.35); }
    .type-btn.active-gider { background: var(--gider); color: #fff; box-shadow: 0 4px 16px rgba(244,63,94,.35); }

    /* ── INPUTS ── */
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .text-input, .select-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      font-family: 'Sora', sans-serif; font-size: 15px;
      color: var(--text); outline: none;
      transition: border-color .15s; width: 100%;
    }
    .text-input:focus, .select-input:focus { border-color: var(--accent); }

    /* ── BUTTONS ── */
    .primary-btn {
      background: linear-gradient(145deg, #f59e0b, #d97706);
      border: none; border-radius: 14px; padding: 18px;
      font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700;
      color: #111; cursor: pointer;
      transition: transform .15s, opacity .15s; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .primary-btn:hover { transform: translateY(-1px); }
    .primary-btn:active { transform: translateY(0); opacity: .9; }
    .primary-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .pdf-dl-btn {
      border: none; border-radius: 14px; padding: 18px;
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: transform .15s, opacity .15s;
    }
    .pdf-dl-btn:hover { transform: translateY(-1px); }
    .pdf-dl-btn:active { transform: translateY(0); }
    .pdf-dl-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .pdf-dl-btn.gelir { background: linear-gradient(145deg, #22c55e, #16a34a); color: #fff; }
    .pdf-dl-btn.gider { background: linear-gradient(145deg, #f43f5e, #e11d48); color: #fff; }

    /* ── SPINNER ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.2); border-top-color: #111;
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    .pdf-dl-btn .spinner { border-color: rgba(255,255,255,.3); border-top-color: #fff; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 115px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 22px;
      border-radius: 12px; font-size: 14px; font-weight: 500;
      opacity: 0; transition: all .28s; z-index: 200;
      white-space: nowrap; max-width: 88vw; text-align: center;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--gelir); color: var(--gelir); }
    #toast.error { border-color: var(--gider); color: var(--gider); }

    input[type="file"] { display: none; }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="44" height="44" fill="none" viewBox="0 0 44 44">
        <path d="M10 14h24M10 22h18M10 30h21" stroke="#111" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="30" r="6" fill="#111" opacity=".15" stroke="#111" stroke-width="2"/>
        <path d="M35 27v3.5l2 1.5" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-title">Evrak Takip</div>
    <div class="logo-sub">Gelir &amp; gider evraklarınızı<br>Drive'da düzenli saklayın</div>
  </div>
  <button class="login-btn" onclick="signIn()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google ile Giriş Yap
  </button>
</div>

<div id="mainScreen">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 20 20">
          <path d="M3 6h14M3 10h9M3 14h11" stroke="#111" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="header-title">Evrak Takip</span>
    </div>
    <div class="header-right">
      <button class="pdf-btn" onclick="openPdfModal()">
        <svg width="13" height="13" fill="none" viewBox="0 0 13 13" style="display:inline;vertical-align:middle;margin-right:5px">
          <path d="M6.5 1.5v7M4 6l2.5 2.5L9 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1.5 10.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        PDF İndir
      </button>
      <img id="userAvatar" src="" alt="Kullanıcı" class="user-avatar" onclick="confirmSignOut()" title="Çıkış yapmak için tıklayın">
    </div>
  </div>

  <div class="month-bar" id="monthBar"></div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">
        <div class="stat-dot" style="background:var(--gelir)"></div>
        Gelir Evrakı
      </div>
      <div class="stat-count gelir" id="gelirCount">—</div>
      <div class="stat-sub">bu ayın evrakları</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">
        <div class="stat-dot" style="background:var(--gider)"></div>
        Gider Evrakı
      </div>
      <div class="stat-count gider" id="giderCount">—</div>
      <div class="stat-sub">bu ayın evrakları</div>
    </div>
  </div>

  <div class="section-title">Evraklar</div>
  <div class="files-grid" id="filesGrid">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="32" height="32" fill="none" viewBox="0 0 32 32">
          <rect x="6" y="4" width="20" height="24" rx="3" stroke="#6a6a90" stroke-width="2"/>
          <path d="M10 12h12M10 17h8" stroke="#6a6a90" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="empty-title">Yükleniyor...</div>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="openAddModal()" style="display:none" aria-label="Evrak Ekle">
  <svg width="28" height="28" fill="none" viewBox="0 0 28 28">
    <path d="M14 5v18M5 14h18" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  </svg>
</button>

<div class="modal-overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Evrak Ekle</span>
      <button class="modal-close" onclick="closeAddModal()" aria-label="Kapat">
        <svg width="14" height="14" fill="none" viewBox="0 0 14 14">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">

  <div class="photo-preview" id="photoPreview">
    <img id="previewImg" src="" alt="Önizleme">
    <div class="photo-placeholder" id="previewPlaceholder">
      <svg width="44" height="44" fill="none" viewBox="0 0 44 44" style="margin:0 auto">
        <rect x="4" y="10" width="36" height="27" rx="5" stroke="#6a6a90" stroke-width="2"/>
        <circle cx="22" cy="23" r="7" stroke="#6a6a90" stroke-width="2"/>
        <path d="M15 10l2.5-5h9l2.5 5" stroke="#6a6a90" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="36" cy="16" r="2" fill="#6a6a90"/>
      </svg>
      <p>Fotoğraf seçilmedi</p>
    </div>
  </div>

  <div class="capture-row">
    <button class="capture-btn" onclick="triggerCamera()">
      <svg width="17" height="17" fill="none" viewBox="0 0 17 17">
        <path d="M13.5 4.5H3.5a1.5 1.5 0 00-1.5 1.5v7a1.5 1.5 0 001.5 1.5h10a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5z" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="8.5" cy="9.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M6 4.5l1.2-2.5h2.6L11 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Kamera
    </button>
    <button class="capture-btn" onclick="triggerGallery()">
      <svg width="17" height="17" fill="none" viewBox="0 0 17 17">
        <rect x="2" y="3" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="6" cy="7" r="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M2 12l3.5-3.5 2.5 2.5 2-2 4.5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Galeri
    </button>
  </div>

  <div class="type-toggle">
    <button class="type-btn active-gelir" id="gelirBtn" onclick="setType('gelir')">
      <svg width="15" height="15" fill="none" viewBox="0 0 15 15">
        <path d="M7.5 12V3M4 6l3.5-3 3.5 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Gelir
    </button>
    <button class="type-btn" id="giderBtn" onclick="setType('gider')">
      <svg width="15" height="15" fill="none" viewBox="0 0 15 15">
        <path d="M7.5 3v9M4 9l3.5 3 3.5-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Gider
    </button>
  </div>

  <div class="input-group">
    <div class="input-label">Not (opsiyonel)</div>
    <input type="text" id="noteInput" class="text-input" placeholder="Yakıt fişi, elektrik faturası, vb.">
  </div>

  <button class="primary-btn" id="saveBtn" onclick="saveEvrak()">
    <span id="saveBtnText">Kaydet &amp; Drive'a Yükle</span>
    <div class="spinner" id="saveSpinner"></div>
  </button>
</div>

  </div>
</div>

<div class="modal-overlay" id="pdfOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">PDF İndir</span>
      <button class="modal-close" onclick="closePdfModal()" aria-label="Kapat">
        <svg width="14" height="14" fill="none" viewBox="0 0 14 14">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <div class="input-label">Ay Seç</div>
        <select id="pdfMonthSel" class="select-input"></select>
      </div>
      <button class="pdf-dl-btn gelir" id="gelirPdfBtn" onclick="generatePdf('Gelir')">
        <svg width="17" height="17" fill="none" viewBox="0 0 17 17">
          <path d="M8.5 2v10M5.5 9l3 3 3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2.5 14.5h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span id="gelirPdfTxt">Gelir PDF İndir</span>
        <div class="spinner" id="gelirSpin"></div>
      </button>
      <button class="pdf-dl-btn gider" id="giderPdfBtn" onclick="generatePdf('Gider')">
        <svg width="17" height="17" fill="none" viewBox="0 0 17 17">
          <path d="M8.5 2v10M5.5 9l3 3 3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2.5 14.5h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span id="giderPdfTxt">Gider PDF İndir</span>
        <div class="spinner" id="giderSpin"></div>
      </button>
    </div>
  </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment">
<input type="file" id="galleryInput" accept="image/*">

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CLIENT_ID = '250950237844-6etrlhr0r63erh7nqpljb5qhmhtp8kmv.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile';
const MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let tokenClient;
let accessToken  = null;
let tokenExpiry  = 0;
let pendingResolve = null;
let currentType    = 'gelir';
let selectedFile   = null;
let currentMonthKey = null;
let rootFolderId   = null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const now = new Date();
  currentMonthKey = toMonthKey(now);
  
  // Google objesi sayfada zaten var mı kontrol et
  if (window.google && window.google.accounts) {
    initGIS();
  } else {
    // Yoksa script'in yüklenmesini bekle
    const gsiScript = document.querySelector('script[src*="gsi"]');
    if (gsiScript) gsiScript.addEventListener('load', initGIS);
  }
});

function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: response => {
      if (response.error) {
        showToast('Giriş başarısız: ' + response.error, 'error');
        if (pendingResolve) { pendingResolve(false); pendingResolve = null; }
        return;
      }
      accessToken = response.access_token;
      tokenExpiry = Date.now() + response.expires_in * 1000 - 90000;
      if (pendingResolve) { pendingResolve(true); pendingResolve = null; }
      else { onSignIn(); }
    }
  });
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function signIn() { 
  if (!tokenClient) {
    showToast('Google servisleri yükleniyor, birkaç saniye bekleyip tekrar deneyin.', 'error');
    return;
  }
  tokenClient.requestAccessToken({ prompt: 'consent' }); 
}

function confirmSignOut() {
  if (!confirm('Çıkış yapmak istiyor musunuz?')) return;
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; rootFolderId = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainScreen').style.display  = 'none';
  document.getElementById('fab').style.display = 'none';
}

async function ensureToken() {
  if (accessToken && Date.now() < tokenExpiry) return;
  await new Promise(resolve => {
    pendingResolve = resolve;
    tokenClient.requestAccessToken({ prompt: '' });
  });
}

async function onSignIn() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const p = await r.json();
    const av = document.getElementById('userAvatar');
    av.src   = p.picture || '';
    av.title = `${p.name} — Çıkış için tıklayın`;
  } catch (_) {}

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display  = 'block';
  document.getElementById('fab').style.display = 'flex';

  buildMonthBar();
  buildPdfSel();
  await loadFiles();
}

// ─── DRIVE API ────────────────────────────────────────────────────────────────
async function driveReq(url, opts = {}) {
  await ensureToken();
  const res = await fetch(url, {
    ...opts,
    headers: { Authorization: `Bearer ${accessToken}`, ...(opts.headers || {}) }
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`Drive ${res.status}: ${t}`); }
  return res;
}

async function findFolder(name, parentId) {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const r = await driveReq(`https://www.googleapis.com/drive/v3/files?q=${enc(q)}&fields=files(id)&pageSize=1`);
  const d = await r.json();
  return d.files.length ? d.files[0].id : null;
}

async function createFolder(name, parentId) {
  const body = { name, mimeType: 'application/vnd.google-apps.folder' };
  if (parentId) body.parents = [parentId];
  const r = await driveReq('https://www.googleapis.com/drive/v3/files', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  return (await r.json()).id;
}

async function ensureFolder(name, parentId) {
  return (await findFolder(name, parentId)) || (await createFolder(name, parentId));
}

async function getRootFolder() {
  if (rootFolderId) return rootFolderId;
  rootFolderId = await ensureFolder('Muhasebe', null);
  return rootFolderId;
}

async function getTypeFolder(type, monthKey) {
  const [year, month] = monthKey.split('-');
  const label = `${MONTHS_TR[+month - 1]} ${year}`;
  const root  = await getRootFolder();
  const mId   = await ensureFolder(label, root);
  return ensureFolder(type === 'gelir' ? 'Gelir' : 'Gider', mId);
}

async function listFolder(folderId) {
  const q = `'${folderId}' in parents and trashed=false`;
  const r = await driveReq(
    `https://www.googleapis.com/drive/v3/files?q=${enc(q)}&fields=files(id,name,createdTime,thumbnailLink)&orderBy=createdTime&pageSize=200`
  );
  return (await r.json()).files || [];
}

async function uploadFile(blob, folderId, name) {
  const meta = JSON.stringify({ name, parents: [folderId] });
  const form = new FormData();
  form.append('metadata', new Blob([meta], { type: 'application/json' }));
  form.append('file', blob);
  const r = await driveReq(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',
    { method: 'POST', body: form }
  );
  return r.json();
}

async function downloadBlob(fileId) {
  const r = await driveReq(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  return r.blob();
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function toMonthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function enc(s)        { return encodeURIComponent(s); }

function buildMonthBar() {
  const bar = document.getElementById('monthBar');
  bar.innerHTML = '';
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d   = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = toMonthKey(d);
    const lbl = `${MONTHS_TR[d.getMonth()]} ${d.getFullYear()}`;
    const el  = document.createElement('div');
    el.className = 'month-chip' + (key === currentMonthKey ? ' active' : '');
    el.textContent = lbl;
    el.onclick = () => switchMonth(key, el);
    bar.appendChild(el);
  }
  setTimeout(() => bar.querySelector('.active')?.scrollIntoView({ inline:'end', behavior:'smooth' }), 120);
}

function buildPdfSel() {
  const sel = document.getElementById('pdfMonthSel');
  sel.innerHTML = '';
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d   = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = toMonthKey(d);
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = `${MONTHS_TR[d.getMonth()]} ${d.getFullYear()}`;
    if (key === currentMonthKey) opt.selected = true;
    sel.appendChild(opt);
  }
}

async function switchMonth(key, el) {
  currentMonthKey = key;
  document.querySelectorAll('.month-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  await loadFiles();
}

async function loadFiles() {
  setStats('—', '—');
  showLoading();
  try {
    const root = await getRootFolder();
    const [year, month] = currentMonthKey.split('-');
    const label = `${MONTHS_TR[+month - 1]} ${year}`;
    const mId   = await findFolder(label, root);
    if (!mId) { setStats(0, 0); showEmpty(); return; }

    const [gId, dId] = await Promise.all([
      findFolder('Gelir', mId),
      findFolder('Gider', mId)
    ]);
    const [gelirFiles, giderFiles] = await Promise.all([
      gId ? listFolder(gId) : [],
      dId ? listFolder(dId) : []
    ]);
    setStats(gelirFiles.length, giderFiles.length);
    renderGrid(gelirFiles, giderFiles);
  } catch (e) {
    console.error(e);
    setStats(0, 0);
    showEmpty('Yüklenirken hata oluştu');
  }
}

function setStats(g, d) {
  document.getElementById('gelirCount').textContent = g;
  document.getElementById('giderCount').textContent = d;
}

function showLoading() {
  document.getElementById('filesGrid').innerHTML = `
    <div class="empty-state">
      <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>
      <div style="color:var(--muted);font-size:13px">Yükleniyor...</div>
    </div>`;
}

function showEmpty(msg = 'Bu ayda evrak yok') {
  document.getElementById('filesGrid').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="28" height="28" fill="none" viewBox="0 0 28 28">
          <rect x="5" y="3" width="18" height="22" rx="3" stroke="#6a6a90" stroke-width="1.8"/>
          <path d="M9 11h10M9 15h7" stroke="#6a6a90" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="empty-title">${msg}</div>
      <div style="font-size:13px;color:var(--muted)">+ butonuna basarak ekleyin</div>
    </div>`;
}

function renderGrid(gelirFiles, giderFiles) {
  const grid = document.getElementById('filesGrid');
  grid.innerHTML = '';
  if (!gelirFiles.length && !giderFiles.length) { showEmpty(); return; }

  const all = [
    ...gelirFiles.map(f => ({ ...f, type:'gelir' })),
    ...giderFiles.map(f => ({ ...f, type:'gider' }))
  ].sort((a,b) => new Date(b.createdTime) - new Date(a.createdTime));

  all.forEach(f => {
    const el = document.createElement('div');
    el.className = 'file-item';
    const arrowUp   = `<svg width="10" height="10" fill="none" viewBox="0 0 10 10"><path d="M5 8V2M3 4l2-2 2 2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const arrowDown = `<svg width="10" height="10" fill="none" viewBox="0 0 10 10"><path d="M5 2v6M3 6l2 2 2-2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    el.innerHTML = f.thumbnailLink
      ? `<img src="${f.thumbnailLink}" alt="${f.name}" loading="lazy">`
      : `<div class="file-item-placeholder"><svg width="22" height="22" fill="none" viewBox="0 0 22 22"><rect x="3" y="2" width="16" height="18" rx="2.5" stroke="#6a6a90" stroke-width="1.5"/><path d="M7 9h8M7 13h5" stroke="#6a6a90" stroke-width="1.5" stroke-linecap="round"/></svg></div>`;
    el.innerHTML += `<div class="file-badge ${f.type}">${f.type === 'gelir' ? arrowUp : arrowDown}</div>`;
    grid.appendChild(el);
  });
}

// ─── ADD MODAL ────────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewPlaceholder').style.display = 'block';
  document.getElementById('noteInput').value = '';
  document.getElementById('cameraInput').value = '';
  document.getElementById('galleryInput').value = '';
  selectedFile = null;
  setType('gelir');
}
function closeAddModal() { document.getElementById('addOverlay').classList.remove('open'); }
function triggerCamera()  { document.getElementById('cameraInput').click(); }
function triggerGallery() { document.getElementById('galleryInput').click(); }

function setType(t) {
  currentType = t;
  document.getElementById('gelirBtn').className = 'type-btn' + (t==='gelir' ? ' active-gelir' : '');
  document.getElementById('giderBtn').className = 'type-btn' + (t==='gider' ? ' active-gider' : '');
}

function previewFile(file) {
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('previewImg');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('previewPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

document.getElementById('cameraInput').addEventListener('change',  e => previewFile(e.target.files[0]));
document.getElementById('galleryInput').addEventListener('change', e => previewFile(e.target.files[0]));
document.getElementById('addOverlay').addEventListener('click',    e => { if (e.target===document.getElementById('addOverlay')) closeAddModal(); });
document.getElementById('pdfOverlay').addEventListener('click',    e => { if (e.target===document.getElementById('pdfOverlay')) closePdfModal(); });

async function saveEvrak() {
  if (!selectedFile) { showToast('Önce fotoğraf seçin', 'error'); return; }
  const btn     = document.getElementById('saveBtn');
  const btnTxt  = document.getElementById('saveBtnText');
  const spinner = document.getElementById('saveSpinner');
  btn.disabled = true; btnTxt.textContent = 'Yükleniyor...'; spinner.style.display = 'block';
  try {
    const now     = new Date();
    const mKey    = toMonthKey(now);
    const note    = document.getElementById('noteInput').value.trim();
    const ts      = now.toISOString().slice(0,19).replace(/:/g,'-');
    const ext     = selectedFile.type.includes('png') ? 'png' : 'jpg';
    const name    = note ? `${ts}_${note}.${ext}` : `${ts}.${ext}`;
    const folder  = await getTypeFolder(currentType, mKey);
    const blob    = await compressImage(selectedFile, 1400);
    await uploadFile(blob, folder, name);
    showToast('✓ Drive\'a yüklendi', 'success');
    closeAddModal();
    if (mKey === currentMonthKey) await loadFiles();
  } catch(e) {
    console.error(e);
    showToast('Hata: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btnTxt.textContent = "Kaydet & Drive'a Yükle"; spinner.style.display = 'none';
  }
}

async function compressImage(file, maxDim) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width: w, height: h } = img;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else       { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      cv.toBlob(resolve, 'image/jpeg', 0.87);
    };
    img.src = url;
  });
}

// ─── PDF MODAL ────────────────────────────────────────────────────────────────
function openPdfModal()  { document.getElementById('pdfOverlay').classList.add('open'); }
function closePdfModal() { document.getElementById('pdfOverlay').classList.remove('open'); }

async function generatePdf(type) {
  const mKey  = document.getElementById('pdfMonthSel').value;
  const [year, month] = mKey.split('-');
  const mName = MONTHS_TR[+month - 1];
  const isGelir = type === 'Gelir';

  const btn     = document.getElementById(isGelir ? 'gelirPdfBtn' : 'giderPdfBtn');
  const txtEl   = document.getElementById(isGelir ? 'gelirPdfTxt' : 'giderPdfTxt');
  const spinner = document.getElementById(isGelir ? 'gelirSpin'   : 'giderSpin');

  btn.disabled = true; txtEl.textContent = 'Hazırlanıyor...'; spinner.style.display = 'block';
  try {
    const root = await getRootFolder();
    const mId  = await findFolder(`${mName} ${year}`, root);
    if (!mId) { showToast('Bu ayda evrak bulunamadı', 'error'); return; }

    const tId  = await findFolder(type, mId);
    if (!tId)  { showToast(`Bu ayda ${type} evrakı yok`, 'error'); return; }

    const files = await listFolder(tId);
    if (!files.length) { showToast(`Bu ayda ${type} evrakı yok`, 'error'); return; }

    showToast(`${files.length} evrak işleniyor...`);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    pdf.setProperties({ title: `${type} Evrakları — ${mName} ${year}`, author:'Evrak Takip' });

    for (let i = 0; i < files.length; i++) {
      txtEl.textContent = `${i+1} / ${files.length} işleniyor...`;
      const blob   = await downloadBlob(files[i].id);
      const dataUrl= await blobToDataUrl(blob);
      const dims   = await imgDims(dataUrl);
      if (i > 0) pdf.addPage();

      const mg = 12, pw = 210 - mg*2, ph = 297 - mg*2;
      let { w, h } = dims;
      const scale  = Math.min(pw/w, ph/h);
      w *= scale; h *= scale;
      const x = mg + (pw-w)/2, y = mg + (ph-h)/2;

      pdf.addImage(dataUrl, blob.type.includes('png')?'PNG':'JPEG', x, y, w, h, '', 'FAST');
      pdf.setFontSize(8); pdf.setTextColor(160);
      pdf.text(files[i].name.length > 60 ? files[i].name.slice(0,57)+'…' : files[i].name, mg, 293);
      pdf.text(`${i+1} / ${files.length}`, 210-mg, 293, { align:'right' });
    }

    pdf.save(`${type}_${mName}_${year}.pdf`);
    showToast(`✓ PDF indirildi (${files.length} evrak)`, 'success');
  } catch(e) {
    console.error(e);
    showToast('PDF oluşturulamadı: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    txtEl.textContent = isGelir ? 'Gelir PDF İndir' : 'Gider PDF İndir';
    spinner.style.display = 'none';
  }
}

function blobToDataUrl(blob) {
  return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(blob); });
}
function imgDims(src) {
  return new Promise(res => { const i = new Image(); i.onload = () => res({w:i.width, h:i.height}); i.src = src; });
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3200);
}
</script>
